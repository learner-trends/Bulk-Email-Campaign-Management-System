<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Campaigns — Campaign Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
        nav { background: #1a1a2e; color: white; padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 8px; }
        nav h1 { font-size: 18px; font-weight: 700; color: #7eb8f7; margin-right: 32px; }
        nav a { color: rgba(255,255,255,0.75); text-decoration: none; padding: 8px 14px; border-radius: 6px; font-size: 14px; transition: all 0.2s; }
        nav a:hover, nav a.active { background: rgba(255,255,255,0.12); color: white; }
        .container { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
        .page-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .page-header h2 { font-size: 22px; font-weight: 600; }
        .card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: #2563eb; color: white; } .btn-primary:hover { background: #1d4ed8; }
        .btn-sm { padding: 5px 12px; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; }
        td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafbfc; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-DRAFT { background: #e2e8f0; color: #64748b; }
        .badge-SCHEDULED { background: #dbeafe; color: #1d4ed8; }
        .badge-IN_PROGRESS { background: #fef3c7; color: #d97706; }
        .badge-COMPLETED { background: #dcfce7; color: #16a34a; }
        .badge-FAILED { background: #fee2e2; color: #dc2626; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .alert-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .empty-state { text-align: center; padding: 48px; color: #9ca3af; }
        .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    </style>
</head>
<body>
<nav>
    <h1>📧 Campaign Manager</h1>
    <a href="/">Dashboard</a>
    <a href="/campaigns" class="active">Campaigns</a>
    <a href="/recipients">Recipients</a>
</nav>

<div class="container">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div class="page-header">
        <h2>📋 Campaigns</h2>
        <a href="/campaigns/new" class="btn btn-primary">+ New Campaign</a>
    </div>

    <div class="card">
        <div th:if="${#lists.isEmpty(campaigns)}" class="empty-state">
            <p>No campaigns found.</p>
            <a href="/campaigns/new" class="btn btn-primary">Create your first campaign</a>
        </div>
        <table th:unless="${#lists.isEmpty(campaigns)}">
            <thead>
            <tr>
                <th>#</th>
                <th>Campaign Name</th>
                <th>Subject</th>
                <th>Status</th>
                <th>Scheduled</th>
                <th>Sent / Failed</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${campaigns}">
                <td th:text="${c.id}"></td>
                <td><strong th:text="${c.campaignName}"></strong></td>
                <td th:text="${c.subjectLine}"></td>
                <td>
                    <span class="badge" th:classappend="'badge-' + ${c.status}" th:text="${c.status}"></span>
                </td>
                <td th:text="${#temporals.format(c.scheduledTime, 'dd MMM yyyy HH:mm')}"></td>
                <td>
                    <span style="color:#16a34a;" th:text="${c.sentCount}">0</span> /
                    <span style="color:#dc2626;" th:text="${c.failedCount}">0</span>
                </td>
                <td>
                    <div class="actions">
                        <a th:href="@{/campaigns/{id}(id=${c.id})}" class="btn btn-sm btn-primary">View</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
