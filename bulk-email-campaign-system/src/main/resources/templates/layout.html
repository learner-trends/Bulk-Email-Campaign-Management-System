<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' — Campaign Manager' : 'Campaign Manager'}">Campaign Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
        nav { background: #1a1a2e; color: white; padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 8px; }
        nav h1 { font-size: 18px; font-weight: 700; color: #7eb8f7; margin-right: 32px; }
        nav a { color: rgba(255,255,255,0.75); text-decoration: none; padding: 8px 14px; border-radius: 6px; font-size: 14px; transition: all 0.2s; }
        nav a:hover, nav a.active { background: rgba(255,255,255,0.12); color: white; }
        .container { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
        .page-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .page-header h2 { font-size: 22px; font-weight: 600; }
        .card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: #2563eb; color: white; } .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: #16a34a; color: white; } .btn-success:hover { background: #15803d; }
        .btn-warning { background: #d97706; color: white; } .btn-warning:hover { background: #b45309; }
        .btn-danger { background: #dc2626; color: white; } .btn-danger:hover { background: #b91c1c; }
        .btn-secondary { background: #e2e8f0; color: #475569; } .btn-secondary:hover { background: #cbd5e1; }
        .btn-sm { padding: 5px 12px; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; }
        td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafbfc; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-draft { background: #e2e8f0; color: #64748b; }
        .badge-scheduled { background: #dbeafe; color: #1d4ed8; }
        .badge-in_progress { background: #fef3c7; color: #d97706; }
        .badge-completed { background: #dcfce7; color: #16a34a; }
        .badge-failed { background: #fee2e2; color: #dc2626; }
        .badge-sent { background: #dcfce7; color: #16a34a; }
        .badge-subscribed { background: #dcfce7; color: #16a34a; }
        .badge-unsubscribed { background: #fee2e2; color: #dc2626; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .alert-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .alert-warning { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }
        input[type="text"], input[type="datetime-local"], textarea, select { width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; transition: border-color 0.2s; font-family: inherit; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        textarea { resize: vertical; min-height: 160px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
        .stat-card .label { font-size: 13px; color: #6b7280; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #1a1a2e; }
        .stat-card .sub { font-size: 12px; color: #9ca3af; margin-top: 4px; }
        .empty-state { text-align: center; padding: 48px; color: #9ca3af; }
        .empty-state p { font-size: 16px; margin-bottom: 16px; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    </style>
</head>
<body>
<nav>
    <h1>📧 Campaign Manager</h1>
    <a th:href="@{/}" th:classappend="${currentPage == 'dashboard' ? 'active' : ''}">Dashboard</a>
    <a th:href="@{/campaigns}" th:classappend="${currentPage == 'campaigns' ? 'active' : ''}">Campaigns</a>
    <a th:href="@{/recipients}" th:classappend="${currentPage == 'recipients' ? 'active' : ''}">Recipients</a>
</nav>
<div class="container">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>
    <div th:if="${warnings}" class="alert alert-warning">
        <strong>Warnings:</strong>
        <ul style="margin-top:6px; padding-left:20px;">
            <li th:each="w : ${warnings}" th:text="${w}"></li>
        </ul>
    </div>
</div>
</body>
</html>
