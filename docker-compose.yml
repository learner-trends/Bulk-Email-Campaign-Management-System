
  services:

    mysql:
      image: mysql:8
      container_name: email-mysql
      restart: always

      environment:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: bulk_email_campaign

      ports:
        - "3307:3306"

      volumes:
        - mysql_data:/var/lib/mysql

      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 10

    backend:
      build: ./bulk-email-campaign-system
      container_name: email-backend
      restart: always

      depends_on:
        mysql:
          condition: service_healthy

      ports:
        - "8080:8080"

      environment:
        SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bulk_email_campaign?createDatabaseIfNotExist=true&serverTimezone=UTC
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root

    frontend:
      build: ./email-campaign
      container_name: email-frontend
      restart: always

      depends_on:
        - backend

      ports:
        - "5173:5173"

  volumes:
    mysql_data:

